name: Frontend Generator Smoke

on:
  workflow_dispatch:
    inputs:
      generators:
        description: 'Comma-separated generator list, or empty for all'
        required: false
        default: ''
      execute:
        description: 'Run official generators instead of dry-run contract checks'
        required: true
        type: boolean
        default: true
  schedule:
    - cron: '17 9 * * 1'

permissions:
  contents: read

jobs:
  smoke:
    name: Official frontend generator smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.20.0'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Dry-run contract smoke
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.execute == 'false' }}
        run: |
          if [ -n "${{ github.event.inputs.generators }}" ]; then
            npm --workspace workspai run smoke:frontend-generators -- --generators "${{ github.event.inputs.generators }}"
          else
            npm --workspace workspai run smoke:frontend-generators
          fi

      - name: Network official generator smoke
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.execute == 'true' }}
        env:
          RAPIDKIT_FRONTEND_GENERATOR_SMOKE: network
          RAPIDKIT_FRONTEND_GENERATOR_TIMEOUT_MS: '240000'
        run: |
          if [ -n "${{ github.event.inputs.generators }}" ]; then
            npm --workspace workspai run smoke:frontend-generators:network -- --generators "${{ github.event.inputs.generators }}"
          else
            npm --workspace workspai run smoke:frontend-generators:network
          fi
