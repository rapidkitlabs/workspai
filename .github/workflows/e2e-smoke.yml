name: Bridge Regression Smoke

on:
  push:
    branches: [main, develop]
    paths:
      - "packages/cli/src/index.ts"
      - "packages/cli/src/core-bridge/**"
      - "packages/cli/src/runtime-adapters/python.ts"
      - "packages/cli/src/__tests__/core-bridge.test.ts"
      - "packages/cli/src/__tests__/scenario-c-system-python-has-core.test.ts"
      - ".github/workflows/e2e-smoke.yml"
      - ".github/workflows/release-npm-manual.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "packages/cli/src/index.ts"
      - "packages/cli/src/core-bridge/**"
      - "packages/cli/src/runtime-adapters/python.ts"
      - "packages/cli/src/__tests__/core-bridge.test.ts"
      - "packages/cli/src/__tests__/scenario-c-system-python-has-core.test.ts"
      - ".github/workflows/e2e-smoke.yml"
      - ".github/workflows/release-npm-manual.yml"
  workflow_dispatch:

jobs:
  bridge-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Use Python 3.x
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: npm ci

      - name: Workaround npm optional-deps bug (rollup on Linux)
        run: npm install --workspace workspai --no-save @rollup/rollup-linux-x64-gnu

      - name: Build
        run: npm --workspace workspai run build

      - name: "Run focused bridge regression tests"
        run: |
          npm --workspace workspai test -- \
            src/__tests__/core-bridge.test.ts \
            src/__tests__/scenario-c-system-python-has-core.test.ts
        env:
          # Isolate bridge cache/venv artifacts per runner
          XDG_CACHE_HOME: ${{ runner.temp }}
