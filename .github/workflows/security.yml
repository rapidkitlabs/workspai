name: Security Audit

permissions:
  contents: read
  security-events: write

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run security audit daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Block high and critical npm vulnerabilities
        run: npm audit --audit-level=high

      - name: Generate CycloneDX-compatible npm SBOM
        run: npm sbom --sbom-format cyclonedx > workspai-sbom.cdx.json

      - name: Analyze source with CodeQL
        uses: github/codeql-action/analyze@v3

      - name: Run dependency check
        run: |
          npm install -g npm-check-updates
          ncu --errorLevel 2
        continue-on-error: true

      - name: Check for outdated dependencies
        run: npm outdated || true

      - name: Generate security report
        run: |
          echo "# Security Audit Report" > security-report.md
          echo "" >> security-report.md
          echo "## npm audit" >> security-report.md
          npm audit --json > audit.json || true
          cat audit.json >> security-report.md
          echo "" >> security-report.md
          echo "## Outdated dependencies" >> security-report.md
          npm outdated >> security-report.md || true

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.md
          retention-days: 30

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: workspai-sbom
          path: workspai-sbom.cdx.json
          retention-days: 90
