name: CI & Metrics Matrix

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  phase4-fast-guard:
    name: Phase4 Fast Guard (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect phase4-impacting changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            phase4:
              - 'src/index.ts'
              - 'src/runtime-adapters/**'
              - 'src/core-bridge/**'
              - 'src/__tests__/phase3-cli.integration.test.ts'
              - 'src/__tests__/phase3-commands.test.ts'
              - 'src/__tests__/phase3-commands.integration.test.ts'
              - 'src/__tests__/init-scenarios.integration.test.ts'
              - 'src/__tests__/runtime-adapters.test.ts'

      - name: Skip message (no phase4 changes)
        if: steps.changes.outputs.phase4 != 'true'
        run: echo "No phase4-related changes detected; skipping fast guard."

      - name: Setup Node.js 20
        if: steps.changes.outputs.phase4 == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        if: steps.changes.outputs.phase4 == 'true'
        run: npm ci

      - name: Build project
        if: steps.changes.outputs.phase4 == 'true'
        run: npm run build

      - name: Run phase3 CLI integration fast guard
        if: steps.changes.outputs.phase4 == 'true'
        env:
          RAPIDKIT_ENABLE_RUNTIME_ADAPTERS: '1'
        run: npm run test -- src/__tests__/phase3-cli.integration.test.ts

  build-test-matrix:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      RAPIDKIT_BUNDLE_SIZE_LIMIT_KB: '1000'

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20]

    steps:
      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # Setup Python (Linux & macOS only)
      - name: Setup Python
        if: runner.os != 'Windows'
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # Install rapidkit-core (Python)
      - name: Install rapidkit-core (Python)
        if: runner.os != 'Windows'
        run: |
          python -m pip install --upgrade pip
          pip install rapidkit-core

      # Install Node dependencies
      - name: Install dependencies
        shell: bash
        run: |
          npm ci

          # Platform-specific Rollup optional binaries (temporary workaround)
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            npm install @rollup/rollup-darwin-arm64 --save-dev --no-audit || true
          elif [[ "${{ runner.os }}" == "Windows" ]]; then
            npm install @rollup/rollup-win32-x64-msvc --save-dev --no-audit || true
          fi

      # Contract schema sync (monorepo only, opt-in via env)
      - name: Check contracts sync
        shell: bash
        env:
          RAPIDKIT_CORE_SCHEMA_PATH: ${{ env.RAPIDKIT_CORE_SCHEMA_PATH }}
        run: |
          if [[ -n "${RAPIDKIT_CORE_SCHEMA_PATH}" && -f "${RAPIDKIT_CORE_SCHEMA_PATH}" ]]; then
            npm run check:contracts
          else
            echo "Skipping contract sync check (no RAPIDKIT_CORE_SCHEMA_PATH provided)"
          fi

      # Build
      - name: Build project
        run: npm run build

      # Shared parity contract gate (npm <-> extension snapshot)
      - name: Validate import stack parity contract snapshot
        run: npm run test:parity-contract

      # Backend operations import guard
      - name: Validate backend project import rollback guard
        run: npm run test -- src/__tests__/import-project.test.ts

      # Docs quality gates (Linux only)
      - name: Validate docs quality
        if: runner.os == 'Linux'
        run: npm run validate:docs

      # Lint
      - name: Run linter
        run: npm run lint

      # Type check
      - name: Run type check
        run: npm run typecheck

      # Format check (skip Windows)
      - name: Run format check
        if: runner.os != 'Windows'
        run: npm run format:check

      # Ensure embeddings file exists for AI recommender tests
      - name: Generate mock embeddings for tests
        run: npm run test:prepare-embeddings

      # Tests + coverage
      - name: Run tests with coverage
        run: npm run test:coverage

      # Metrics (Linux only)
      - name: Run metrics collection
        if: runner.os == 'Linux'
        run: npx tsx scripts/metrics.ts

      # Bundle size guard (Linux only)
      - name: Check bundle size
        if: runner.os == 'Linux'
        run: |
          npm run bundle-size
          BUNDLE_SIZE=$(du -sk dist/ | cut -f1)
          echo "Bundle size: ${BUNDLE_SIZE} KB"
          if [ "$BUNDLE_SIZE" -gt "${RAPIDKIT_BUNDLE_SIZE_LIMIT_KB}" ]; then
            echo "❌ Bundle size exceeds ${RAPIDKIT_BUNDLE_SIZE_LIMIT_KB} KB!"
            exit 1
          fi

      # Upload coverage (Linux only)
      - name: Upload coverage to Codecov
        if: runner.os == 'Linux'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: rapidkit-coverage
          fail_ci_if_error: false

  phase4-runtime-contracts:
    name: Phase4 Runtime Contracts (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Workaround npm optional-deps bug (rollup on Windows)
        if: runner.os == 'Windows'
        run: npm install --no-save @rollup/rollup-win32-x64-msvc

      - name: Workaround npm optional-deps bug (rollup on macOS arm64)
        if: runner.os == 'macOS'
        run: npm install --no-save @rollup/rollup-darwin-arm64

      - name: Build project
        run: npm run build

      - name: Generate mock embeddings for tests
        run: npm run test:prepare-embeddings

      - name: Run Phase 4 adapter/contract regression suites
        env:
          RAPIDKIT_ENABLE_RUNTIME_ADAPTERS: '1'
        run: |
          npm run test -- \
            src/__tests__/phase3-commands.test.ts \
            src/__tests__/phase3-commands.integration.test.ts \
            src/__tests__/phase3-cli.integration.test.ts \
            src/__tests__/init-scenarios.integration.test.ts \
            src/__tests__/runtime-adapters.test.ts

      - name: Run type check
        run: npm run typecheck
