name: Windows Bridge E2E

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  windows-bridge-e2e:
    name: Windows Bridge + Workspace E2E
    runs-on: windows-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        shell: pwsh
        run: npm ci

      - name: Workaround npm optional-deps bug (rollup on Windows)
        shell: pwsh
        run: npm install --no-save @rollup/rollup-win32-x64-msvc

      - name: Build
        shell: pwsh
        run: npm run build

      - name: Generate mock embeddings for tests
        shell: pwsh
        run: npm run test:prepare-embeddings

      - name: Focused bridge resolver regression tests
        shell: pwsh
        run: |
          npm run test -- `
            src/__tests__/platform-capabilities.test.ts `
            src/__tests__/workspace-launcher-windows.test.ts `
            src/__tests__/pythonRapidkitExec-workspace-runner.test.ts `
            src/__tests__/pythonRapidkitExec.test.ts

      - name: Bridge + lifecycle smoke (native pwsh)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $env:RAPIDKIT_BRIDGE_FORCE_VENV = '1'
          $env:RAPIDKIT_SKIP_LOCK_SYNC = '1'
          $env:RAPIDKIT_BRIDGE_PIP_TIMEOUT_MS = '180000'
          $env:PIP_DISABLE_PIP_VERSION_CHECK = '1'

          $testRoot = Join-Path $env:RUNNER_TEMP 'rapidkit-win-bridge-e2e'
          if (Test-Path $testRoot) {
            Remove-Item -Recurse -Force $testRoot
          }
          New-Item -ItemType Directory -Path $testRoot | Out-Null
          Set-Location $testRoot

          $cli = Join-Path $env:GITHUB_WORKSPACE 'dist/index.js'

          Write-Host '--- Bridge probe: list --json'
          $listOut = & node $cli list --json
          if ($LASTEXITCODE -ne 0) {
            throw 'list --json failed on Windows bridge path'
          }
          $listJson = $listOut | ConvertFrom-Json
          if (-not $listJson.schema_version) {
            throw 'list --json did not return schema_version'
          }

          Write-Host '--- Bridge probe: version --json'
          $versionOut = & node $cli version --json
          if ($LASTEXITCODE -ne 0) {
            throw 'version --json failed on Windows bridge path'
          }
          $versionJson = $versionOut | ConvertFrom-Json
          if (-not $versionJson.version) {
            throw 'version --json did not include version'
          }

          Write-Host '--- Create workspace'
          & node $cli create workspace ws-win --yes --profile minimal
          if ($LASTEXITCODE -ne 0) {
            throw 'create workspace failed'
          }
          Set-Location (Join-Path $testRoot 'ws-win')

          Write-Host '--- Bootstrap workspace (go-only -> polyglot)'
          & node $cli bootstrap --profile go-only
          if ($LASTEXITCODE -ne 0) {
            throw 'bootstrap --profile go-only failed'
          }

          & node $cli bootstrap --profile polyglot
          if ($LASTEXITCODE -ne 0) {
            throw 'bootstrap --profile polyglot failed'
          }

          if (-not (Test-Path '.rapidkit/reports/bootstrap-compliance.latest.json')) {
            throw 'missing bootstrap-compliance.latest.json'
          }

          Write-Host '--- Init workspace root'
          & node $cli init
          if ($LASTEXITCODE -ne 0) {
            throw 'workspace init failed'
          }

          Write-Host '--- Create project (core bridge path)'
          & node $cli create project fastapi.standard win-api --yes --skip-install
          if ($LASTEXITCODE -ne 0) {
            throw 'create project fastapi.standard failed'
          }

          if (-not (Test-Path 'win-api/.rapidkit/project.json')) {
            throw 'created project is missing .rapidkit/project.json'
          }

          Write-Host '✅ Windows bridge + workspace E2E passed'
