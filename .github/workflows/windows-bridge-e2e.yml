name: Windows Bridge E2E

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  windows-bridge-e2e:
    name: Windows Bridge + Workspace E2E
    runs-on: windows-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        shell: pwsh
        run: npm ci

      - name: Workaround npm optional-deps bug (rollup on Windows)
        shell: pwsh
        run: npm install --workspace workspai --no-save @rollup/rollup-win32-x64-msvc

      - name: Build
        shell: pwsh
        run: npm --workspace workspai run build

      - name: Generate mock embeddings for tests
        shell: pwsh
        run: npm --workspace workspai run test:prepare-embeddings

      - name: Focused bridge resolver regression tests
        shell: pwsh
        run: |
          npm --workspace workspai run test -- `
            src/__tests__/platform-capabilities.test.ts `
            src/__tests__/workspace-launcher-windows.test.ts `
            src/__tests__/pythonRapidkitExec-workspace-runner.test.ts `
            src/__tests__/pythonRapidkitExec.test.ts

      - name: Bridge + lifecycle smoke (native pwsh)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $env:RAPIDKIT_BRIDGE_FORCE_VENV = '1'
          $env:RAPIDKIT_SKIP_LOCK_SYNC = '1'
          $env:RAPIDKIT_BRIDGE_PIP_TIMEOUT_MS = '180000'
          $env:PIP_DISABLE_PIP_VERSION_CHECK = '1'

          $testRoot = Join-Path $env:RUNNER_TEMP 'rapidkit-win-bridge-e2e'
          if (Test-Path $testRoot) {
            Remove-Item -Recurse -Force $testRoot
          }
          New-Item -ItemType Directory -Path $testRoot | Out-Null
          Set-Location $testRoot

          $cli = Join-Path $env:GITHUB_WORKSPACE 'packages/cli/dist/index.js'

          Write-Host '--- Bridge probe: list --json'
          $listOut = & node $cli list --json
          if ($LASTEXITCODE -ne 0) {
            throw 'list --json failed on Windows bridge path'
          }
          $listJson = $listOut | ConvertFrom-Json
          if (-not $listJson.schema_version) {
            throw 'list --json did not return schema_version'
          }

          Write-Host '--- Bridge probe: version --json'
          $versionOut = & node $cli version --json
          if ($LASTEXITCODE -ne 0) {
            throw 'version --json failed on Windows bridge path'
          }
          $versionJson = $versionOut | ConvertFrom-Json
          if (-not $versionJson.version) {
            throw 'version --json did not include version'
          }

          Write-Host '--- Create workspace'
          $createLog = Join-Path $testRoot 'create-ws.log'
          & node $cli create workspace ws-win --yes --profile minimal *> $createLog
          if ($LASTEXITCODE -ne 0) {
            Write-Error 'Workspace creation printed:'
            Get-Content $createLog -TotalCount 200 | ForEach-Object { Write-Host $_ }
            throw 'create workspace failed'
          }

          # Locate the created workspace. Rapidkit may place it in the current
          # test root or under the user profile rapidkit/workspaces folder.
          if (Test-Path (Join-Path $testRoot 'ws-win')) {
            $wsDir = Join-Path $testRoot 'ws-win'
          }
          elseif (Test-Path (Join-Path $env:USERPROFILE 'rapidkit\workspaces\ws-win')) {
            $wsDir = Join-Path $env:USERPROFILE 'rapidkit\workspaces\ws-win'
          }
          else {
            $found = Get-ChildItem -Path $testRoot -Directory -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.Name -eq 'ws-win' } | Select-Object -First 1
            if ($found) {
              $wsDir = $found.FullName
            }
            else {
              $found2 = Get-ChildItem -Path (Join-Path $env:USERPROFILE 'rapidkit\workspaces') -Directory -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.Name -eq 'ws-win' } | Select-Object -First 1
              if ($found2) {
                $wsDir = $found2.FullName
              }
              else {
                Write-Error 'Workspace ws-win not found after create. Debug listing:'
                Write-Host "TEST_ROOT: $testRoot"
                Get-ChildItem -Path $testRoot -Force -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_ }
                Write-Host 'User rapidkit workspaces:'
                Get-ChildItem -Path (Join-Path $env:USERPROFILE 'rapidkit\workspaces') -Force -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_ }
                Write-Error 'create-ws.log (head):'
                Get-Content $createLog -TotalCount 200 | ForEach-Object { Write-Host $_ }
                throw 'Workspace ws-win not found'
              }
            }
          }

          Write-Host "Using workspace at: $wsDir"
          Set-Location $wsDir

          # show git availability for debugging potential 'Could not initialize git repository'
          try { & git --version } catch { Write-Host 'git not found' }

          Write-Host '--- Bootstrap workspace (go-only -> polyglot)'
          & node $cli bootstrap --profile go-only
          if ($LASTEXITCODE -ne 0) {
            throw 'bootstrap --profile go-only failed'
          }

          & node $cli bootstrap --profile polyglot
          if ($LASTEXITCODE -ne 0) {
            throw 'bootstrap --profile polyglot failed'
          }

          if (-not (Test-Path '.workspai/reports/bootstrap-compliance.latest.json')) {
            throw 'missing bootstrap-compliance.latest.json'
          }

          Write-Host '--- Init workspace root'
          & node $cli init
          if ($LASTEXITCODE -ne 0) {
            throw 'workspace init failed'
          }

          Write-Host '--- Create project (core bridge path)'
          & node $cli create project fastapi.standard win-api --yes --skip-install
          if ($LASTEXITCODE -ne 0) {
            throw 'create project fastapi.standard failed'
          }

          if (-not (Test-Path 'win-api/.workspai/project.json')) {
            throw 'created project is missing .workspai/project.json'
          }

          Write-Host '✅ Windows bridge + workspace E2E passed'
