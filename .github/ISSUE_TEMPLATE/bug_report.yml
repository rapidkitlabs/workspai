name: "Bug report"
description: "Report a reproducible bug in Workspai"
title: "[Bug]: "
labels: ["type: bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for opening an issue in Workspai.

        Please provide enough detail to reproduce and validate the fix.
  - type: input
    id: version
    attributes:
      label: Workspai version
      placeholder: "Output of: npx workspai --version"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "OS and Node; include Python only for Python/Core-dependent failures"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1) ... 2) ... 3) ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      render: shell
